    <script>
    (function() {

        document.getElementById('year').textContent = new Date().getFullYear();

        // ── Gallery media data ──
        // Add or remove entries here. Only files that actually exist on disk are listed.

            { type: 'image', src: 'media/0001-dzwanbrfgvg-01.jpg' },

            { type: 'image', src: 'media/0001-dzwanbrfgvg-09.jpg' },
            { type: 'video', src: 'media/0001-dzwanbrfgvg-02.mp4', poster: 'media/0001-dzwanbrfgvg-01.jpg' },
            { type: 'video', src: 'media/0001-dzwanbrfgvg-03.mp4', poster: 'media/0001-dzwanbrfgvg-01.jpg' },
            { type: 'image', src: 'media/0002-dzduunzdz48-01.jpg' },
            { type: 'image', src: 'media/0002-dzduunzdz48-03.jpg' },
            { type: 'image', src: 'media/0002-dzduunzdz48-05.jpg' },
            { type: 'image', src: 'media/0002-dzduunzdz48-06.jpg' },
            { type: 'video', src: 'media/0002-dzduunzdz48-02.mp4', poster: 'media/0002-dzduunzdz48-01.jpg' },
            { type: 'video', src: 'media/0002-dzduunzdz48-04.mp4', poster: 'media/0002-dzduunzdz48-01.jpg' },
            { type: 'image', src: 'media/0007-dzd04yacarx-02.jpg' },
            { type: 'image', src: 'media/0007-dzd04yacarx-03.jpg' },
            { type: 'image', src: 'media/0007-dzd04yacarx-05.jpg' },
            { type: 'image', src: 'media/0007-dzd04yacarx-06.jpg' },
            { type: 'video', src: 'media/MobileDetailing.mp4', poster: 'media/0007-dzd04yacarx-02.jpg' },
            { type: 'image', src: 'media/0013-dylhkmeicgl-01.jpg' },
            { type: 'image', src: 'media/0013-dylhkmeicgl-02.jpg' },
            { type: 'image', src: 'media/0013-dylhkmeicgl-03.jpg' },
            { type: 'image', src: 'media/0016-dvstityikij-01.jpg' },
            { type: 'image', src: 'media/0019-duxb6p9lups-01.jpg' },
            { type: 'image', src: 'media/0019-duxb6p9lups-02.jpg' },

            { type: 'image', src: 'media/0019-duxb6p9lups-06.jpg' },
            { type: 'image', src: 'media/0019-duxb6p9lups-07.jpg' },
            { type: 'video', src: 'media/0019-duxb6p9lups-08.mp4', poster: 'media/0019-duxb6p9lups-01.jpg' },

            { type: 'video', src: 'media/0010-dyi_rgxoair-01.mp4' },
            { type: 'video', src: 'media/0009-dytqdlpiinh-01.mp4' },
            { type: 'video', src: 'media/0008-dzlasb_segf-01.mp4' },
            { type: 'video', src: 'media/0006-dzyoy94ifhy-01.mp4' },
            { type: 'video', src: 'media/0005-dz-r_navj3m-01.mp4' },
            { type: 'video', src: 'media/0004-dz_5u-siuoz-01.mp4' },
            { type: 'image', src: 'media/interiorAfter.jpg' },
            { type: 'image', src: 'media/interiorBefore.png' }
        ];

        // ── Render gallery ──
        var grid = document.querySelector('.gallery-grid');
        if (grid) {
            galleryMedia.forEach(function(media) {
                var col = document.createElement('div');
                col.className = 'col-md-4 col-6';

                if (media.type === 'image') {
                    var img = document.createElement('img');
                    img.src = media.src;
                    img.alt = 'Detailing result';
                    img.className = 'img-fluid gallery-item';
                    img.loading = 'lazy';
                    col.appendChild(img);
                } else {
                    var wrapper = document.createElement('div');
                    wrapper.className = 'gallery-video-wrapper';

                    var video = document.createElement('video');
                    video.className = 'gallery-item gallery-video';
                    video.muted = true;
                    video.playsInline = true;
                    video.loop = true;
                    video.preload = 'auto';
                    if (media.poster) {
                        video.poster = media.poster;
                    }

                    var source = document.createElement('source');
                    source.src = media.src;
                    source.type = 'video/mp4';
                    video.appendChild(source);

                    var indicator = document.createElement('div');
                    indicator.className = 'video-volume-indicator';
                    indicator.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';

                    wrapper.appendChild(video);
                    wrapper.appendChild(indicator);
                    col.appendChild(wrapper);
                }

                grid.appendChild(col);
            });
        }

        // ── IntersectionObserver for scroll-triggered video playback ──
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                var video = entry.target;
                if (entry.isIntersecting) {
                    video.play().catch(function() {});
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.4 });

        document.querySelectorAll('.gallery-video').forEach(function(video) {
            observer.observe(video);

            video.addEventListener('click', function(e) {
                e.stopPropagation();
                this.muted = !this.muted;
                var icon = this.parentElement.querySelector('.video-volume-indicator i');
                if (icon) {
                    icon.className = this.muted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
                }
                if (!this.muted && this.paused) {
                    this.play().catch(function() {});
                }
            });
        });
    })();
    </script>
